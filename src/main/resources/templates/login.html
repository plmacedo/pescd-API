<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box; /* Garante o padding correto */
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #e5e7eb;
            color: var(--text-main);
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        .error-msg {
            color: #dc2626;
            background: #fee2e2;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .divider {
            text-align: center;
            margin: 1rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Login</h1>

    <div th:if="${param.error}" class="error-msg" th:text="#{login.erro}">
        Usuário ou senha inválidos.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Username:</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label th:text="#{login.senha}">Senha:</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn-primary" th:text="#{login.entrar}">
            Entrar
        </button>
    </form>

    <div class="divider">ou</div>

    <a th:href="@{/visitante}" style="text-decoration: none;">
        <button type="button" class="btn-secondary" th:text="#{login.visitante}">
            Acessar como visitante
        </button>
    </a>
</div>

</body>
#</html>
