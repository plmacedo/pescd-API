<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>
</head>

<body>

<h1>Login</h1>

<form th:action="@{/login}" method="post">

    <div>
        <label>Username:</label>
        <input type="text" name="username">
    </div>

    <div>
        <label>Senha:</label>
        <input type="password" name="password">
    </div>

    <button type="submit">
        Entrar
    </button>

</form>

<a th:href="@{/visitante}">
    <button type="button">
        Acessar como visitante
    </button>
</a>

</body>
</html>
